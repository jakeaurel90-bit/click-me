<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secret Message 💖</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(to bottom right, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            text-align: center;
            overflow: hidden;
        }

        .container {
            animation: fadeIn 2s ease-in-out;
        }

        .bunny {
            font-size: 120px;
            animation: bounce 1.5s infinite;
        }

        .message {
            font-size: 28px;
            margin-top: 20px;
            color: #fff;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Bunny with heart eyes -->
        <div class="bunny">🐰💖</div>

        <!-- Message -->
        <div class="message">
            I have a crush on you… <br>
            I just can’t say it 😳
        </div>
    </div>

</body>
</html>
