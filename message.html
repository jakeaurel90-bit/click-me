<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Sabbath 💙</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #89cfff, #dff6ff);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .container {
            background: rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            animation: fadeIn 1.5s ease;
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
        }

        .halo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 25px rgba(255,255,255,0.9);
            animation: glow 2s infinite alternate;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            animation: float 3s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.1);
        }

        .greeting {
            font-size: 34px;
            margin-top: 20px;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        .message {
            font-size: 22px;
            margin-top: 10px;
            color: #ffffff;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes glow {
            from { box-shadow: 0 0 15px rgba(255,255,255,0.6); }
            to { box-shadow: 0 0 35px rgba(255,255,255,1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="image-wrapper">
            <div class="halo"></div>

            <!-- YOUR PHOTO -->
            <img src="boy.jpeg" class="profile-img" alt="Boy Image">

        </div>

        <div class="greeting">
            Happy Sabbath 💙
        </div>

        <div class="message">
            May God fill your day with peace, joy, and love 🙏✨
        </div>
    </div>

</body>
</html>
