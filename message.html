<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Sabbath 💙</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(to bottom right, #a6d8ff, #d6f0ff);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            text-align: center;
            overflow: hidden;
        }

        .container {
            animation: fadeIn 2s ease-in-out;
        }

        .halo {
            width: 120px;
            height: 120px;
            border: 5px solid #ffffff;
            border-radius: 50%;
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
            animation: glow 2s infinite alternate;
        }

        .bunny-wrapper {
            position: relative;
            display: inline-block;
        }

        .bunny {
            font-size: 120px;
            animation: float 2s ease-in-out infinite;
        }

        .greeting {
            font-size: 32px;
            margin-top: 20px;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        .message {
            font-size: 24px;
            margin-top: 10px;
            color: #ffffff;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px rgba(255,255,255,0.6); }
            to { box-shadow: 0 0 30px rgba(255,255,255,1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="bunny-wrapper">
            <div class="halo"></div>
            <div class="bunny">🐰</div>
        </div>

        <div class="greeting">
            Happy Sabbath 💙
        </div>

        <div class="message">
            God bless you always 🙏✨
        </div>
    </div>

</body>
</html>
